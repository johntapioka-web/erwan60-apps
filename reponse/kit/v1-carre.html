<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>V1 carré éditorial 1080×1080</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400;1,600&family=Oswald:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; }
  body { background: #050505; color: #fff; font-family: 'Roboto', sans-serif; position: relative; }

  /* Immense 60 en filigrane outline */
  .watermark {
    position: absolute; right: -60px; top: -120px;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 780px; line-height: 1;
    color: transparent;
    -webkit-text-stroke: 3px rgba(232,119,34,0.28);
    letter-spacing: -0.02em;
    user-select: none;
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 55% at 22% 88%, rgba(232,119,34,0.4) 0%, rgba(150,65,10,0.16) 40%, transparent 68%);
  }
  .sun {
    position: absolute; left: 120px; bottom: 200px;
    width: 130px; height: 65px; border-radius: 130px 130px 0 0;
    background: linear-gradient(to top, #ffd76e, #ffb347);
    box-shadow: 0 0 100px 34px rgba(255,179,71,0.35);
    opacity: 0.9;
  }
  .horizon { position: absolute; left: 60px; right: 420px; bottom: 200px; height: 2px;
    background: linear-gradient(to right, rgba(255,215,110,0.7), transparent); }

  .content { position: absolute; inset: 0; padding: 84px 90px; display: flex; flex-direction: column; }
  .top { display: flex; align-items: center; gap: 22px; }
  .pill {
    display: inline-flex; align-items: center;
    border: 2px solid #E87722; border-radius: 999px;
    color: #ffb347; background: rgba(0,0,0,0.5);
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 27px;
    letter-spacing: 0.18em; text-transform: uppercase; padding: 13px 34px;
  }
  .brand {
    font-family: 'Roboto', sans-serif; font-size: 23px; letter-spacing: 0.3em;
    text-transform: uppercase; color: #999;
  }
  h1 {
    margin-top: 150px;
    font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600;
    font-size: 112px; line-height: 1.12; color: #fff;
    max-width: 860px;
    text-shadow: 0 8px 50px rgba(0,0,0,0.8);
  }
  h1 .orange { color: #E87722; font-style: italic; }
  .sub {
    margin-top: 34px;
    font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 34px;
    letter-spacing: 0.1em; text-transform: uppercase; color: #ddd;
  }
  .sub b { color: #E87722; font-weight: 700; }
  .bottom { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; }
  .cta {
    background: #E87722; border-radius: 18px; padding: 26px 42px;
    box-shadow: 0 0 70px rgba(232,119,34,0.5);
  }
  .cta .t1 {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 38px;
    letter-spacing: 0.05em; text-transform: uppercase; color: #000;
  }
  .cta .t2 { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 24px; color: #fff; margin-top: 8px; }
  .qr-card { background: #fff; border-radius: 14px; padding: 12px; text-align: center; }
  .qr-card img { display: block; width: 150px; height: 150px; }
  .qr-card .lbl { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px;
    letter-spacing: 0.1em; text-transform: uppercase; color: #000; margin-top: 6px; }
</style>
</head>
<body>
  <div class="watermark">60</div>
  <div class="glow"></div>
  <div class="sun"></div>
  <div class="horizon"></div>
  <div class="content">
    <div class="top">
      <span class="pill">⏳ Dernier appel</span>
      <span class="brand">Erwan Sixty · 60 Tour</span>
    </div>
    <h1>Tout est prêt.<br>Il ne manque <span class="orange">que toi.</span></h1>
    <p class="sub">Sarzeau · <b>28 juillet → 2 août</b> · Mer · Îles · Fête</p>
    <div class="bottom">
      <div class="cta">
        <div class="t1">Je réponds en 30 sec →</div>
        <div class="t2">erwan60-apps.netlify.app/reponse</div>
      </div>
      <div class="qr-card">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=https%3A%2F%2Ferwan60-apps.netlify.app%2Freponse%2F" alt="QR">
        <div class="lbl">Scanne-moi</div>
      </div>
    </div>
  </div>
</body>
</html>
