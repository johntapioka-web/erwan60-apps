<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>V3 billet d'embarquement 1200×630</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&family=Oswald:wght@500;600;700&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #050505;
    color: #fff; font-family: 'Roboto', sans-serif;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .bg-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 90% 80% at 50% 115%, rgba(232,119,34,0.35) 0%, rgba(150,65,10,0.12) 45%, transparent 70%);
  }
  /* Le billet */
  .ticket {
    position: relative;
    width: 1100px; height: 520px;
    background: linear-gradient(160deg, #141414, #0b0b0b);
    border: 2px solid rgba(232,119,34,0.55);
    border-radius: 26px;
    display: flex;
    box-shadow: 0 30px 90px rgba(0,0,0,0.8), 0 0 70px rgba(232,119,34,0.18);
    overflow: hidden;
  }
  /* Perforation verticale */
  .perf {
    position: absolute; top: 0; bottom: 0; right: 300px; width: 0;
    border-left: 3px dashed rgba(232,119,34,0.5);
  }
  .notch { position: absolute; width: 44px; height: 44px; border-radius: 50%; background: #050505;
    border: 2px solid rgba(232,119,34,0.55); }
  .notch.top { top: -24px; right: 280px; }
  .notch.bottom { bottom: -24px; right: 280px; }

  .main { flex: 1; padding: 36px 44px; display: flex; flex-direction: column; min-width: 0; }
  .head { display: flex; align-items: center; justify-content: space-between; }
  .head .airline {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 30px;
    letter-spacing: 0.14em; text-transform: uppercase; color: #E87722;
  }
  .head .type {
    font-family: 'Roboto Mono', monospace; font-weight: 500; font-size: 19px;
    letter-spacing: 0.18em; text-transform: uppercase; color: #999;
  }
  h1 {
    margin-top: 20px;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 50px;
    letter-spacing: 0.03em; text-transform: uppercase; line-height: 1.08;
    white-space: nowrap;
  }
  h1 .orange { color: #E87722; }
  .fields { margin-top: 24px; display: flex; gap: 30px; }
  .field .k {
    font-family: 'Roboto Mono', monospace; font-size: 14px; letter-spacing: 0.12em;
    text-transform: uppercase; color: #888;
  }
  .field .v {
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 25px;
    text-transform: uppercase; margin-top: 5px; letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .field .v.alert { color: #E87722; }
  .cta-line {
    margin-top: auto;
    display: inline-flex; align-items: center; gap: 14px;
    background: #E87722; border-radius: 14px; padding: 15px 24px;
    width: fit-content;
    box-shadow: 0 0 50px rgba(232,119,34,0.45);
    white-space: nowrap;
  }
  .cta-line .t {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 26px;
    letter-spacing: 0.03em; text-transform: uppercase; color: #000;
  }
  .cta-line .u { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 19px; color: #fff; }

  .stub {
    width: 300px; padding: 40px 30px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    text-align: center;
  }
  .stub .badge-60 {
    width: 84px; height: 84px; border-radius: 50%;
    border: 3px solid #E87722; color: #E87722;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 36px;
    background: rgba(232,119,34,0.08);
  }
  .stub .qr { background: #fff; border-radius: 12px; padding: 10px; }
  .stub .qr img { display: block; width: 138px; height: 138px; }
  .stub .scan {
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px;
    letter-spacing: 0.14em; text-transform: uppercase; color: #ffb347;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="ticket">
    <div class="main">
      <div class="head">
        <span class="airline">🚴 Erwan Sixty Airlines</span>
        <span class="type">Carte d'embarquement</span>
      </div>
      <h1>60 Tour · Presqu'île de Rhuys<br><span class="orange">Siège : à confirmer</span></h1>
      <div class="fields">
        <div class="field"><div class="k">Destination</div><div class="v">Sarzeau</div></div>
        <div class="field"><div class="k">Embarquement</div><div class="v">28 juillet</div></div>
        <div class="field"><div class="k">Retour</div><div class="v">2 août</div></div>
        <div class="field"><div class="k">Statut</div><div class="v alert">⏳ En attente</div></div>
      </div>
      <div class="cta-line">
        <span class="t">Je confirme mon siège →</span>
        <span class="u">erwan60-apps.netlify.app/reponse</span>
      </div>
    </div>
    <div class="perf"></div>
    <div class="notch top"></div>
    <div class="notch bottom"></div>
    <div class="stub">
      <div class="badge-60">60</div>
      <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=0&data=https%3A%2F%2Ferwan60-apps.netlify.app%2Freponse%2F" alt="QR">
      </div>
      <div class="scan">Scanne pour embarquer</div>
    </div>
  </div>
</body>
</html>
